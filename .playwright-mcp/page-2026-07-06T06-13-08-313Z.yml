            - generic [ref=e283]: 【個人情報のお取り扱いについて】 集客のチカラ（以下、「本サービス」といいます。）のサービスご利用に伴い、本サービスが取得するお客さまの個人情報は以下の通り取り扱います。 以下の内容にご同意頂いてから、お客さまの個人情報をご提供頂きますようお願いいたします。 尚、個人情報を提供するか否かは、お客さまの任意によるものです。ただし、必要な情報をご提供頂けない場合、各種サービス等が適切にご提供できない場合がございますので、ご了承ください。 1. 個人情報の定義 個人情報とは、個人に関する情報であり、氏名、性別、生年月日、ご住所、電話番号、電子メールアドレス等、特定の個人を識別でき得る情報を言います。 2. 利用目的 当サービスは、収集した個人情報について、以下の目的のために利用いたします。 ① 資料送付や見積書発行送付、請求書発行送付、アンケート、お支払い等の①の目的に関連するサービス・手続き・事務処理を遂行するため ② 本サービスを向上するための市場調査や商品開発・改善のため ③ お客さまのご相談・お問い合わせに対応するため ④ 災害などの緊急事態が発生した際の連絡・対応のため ⑤ お客さまに適したサービス等をご提供するため ⑥ その他、上記に付随する目的のため 3. 第三者提供 本サービスは、以下の場合を除いて、個人情報を第三者に提供することは致しません。 ① 法令に基づく場合 ② 人の生命・身体・財産を保護するために必要で、本人から同意を得ることが難しい場合 ③ 公衆衛生の向上・児童の健全な育成のために必要で、本人から同意を得ることが難しい場合 ④ 国の機関や地方公共団体、その委託者などによる法令事務の遂行にあたって協力する必要 ⑤ 明示した利用目的の達成に必要な範囲内で、個人データの取扱いの全部又は一部を第三者に委託する場合、もしくは、第三者と連携してサービス提供を行う場合 ⑥ お客さまの同意がある場合 4. 個人情報の管理 本サービスは、個人情報の漏洩、滅失、毀損等を防止するために、十分な安全保護に努め、また、個人情報を正確に、また最新なものに保つよう、お預かりした個人情報の適切な管理を行います。 また、利用する必要がなくなったときは、当該個人情報を遅滞なく消去するように努めます。 明示した利用目的の達成に必要な範囲内で、個人情報を第三者に委託する場合、当該委託先に機密保持義務を課すなどして個人情報の管理に努めます。 5. 個人情報の保護 本サービスの各種フォームは、SSL（インターネット上のデータを第３者から読み取れないように通信を暗号化する技術）で保護されています。 6. 個人情報の開示、訂正または利用停止 本サービスは、お客さまご本人からの個人情報の開示、利用目的の通知、開示対象個人情報の内容が事実に反する場合等における訂正等、利用停止等及び第三者提供の停止（以下「開示等」といいます）のご請求があった場合にはお客さまご本人からの請求であることを確認の上、遅滞なく対応いたします。ただし、個人情報保護法その他の法令により、本サービスが開示等の義務を負わない場合は、この限りではありません。 尚、開示請求と利用目的の通知につきましては、手数料を頂く場合がございますので、あらかじめご了承ください。
